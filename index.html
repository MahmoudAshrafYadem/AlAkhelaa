<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"الاخلاء": قول فكرتك واحنا معاك</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .app-card { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .logo { display: block; margin: 0 auto 15px; width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #007bff; }
        h2 { text-align: center; color: #1c1e21; font-size: 1.4rem; margin-bottom: 20px; }
        label { font-weight: bold; color: #4b4f56; display: block; margin-top: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #f9fbff; }
        button { width: 100%; background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; padding: 15px; margin-top: 25px; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .success-banner { display: none; background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px; font-weight: bold; }
        
        .ideas-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .idea-item { background: #fff; border: 1px solid #e0e0e0; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .idea-item b { color: #007bff; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-edit { background: #ffc107; color: #000; flex: 1; padding: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-delete { background: #dc3545; color: #fff; flex: 1; padding: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-card">
    <img src="logo.png" alt="Logo" class="logo">
    <h2>"الاخلاء": قول فكرتك واحنا معاك</h2>

    <form id="ideaForm">
        <label>الاسم</label>
        <input type="text" id="userName" placeholder="اكتب اسمك هنا..." required>

        <label>الفكرة</label>
        <textarea id="userIdea" rows="3" placeholder="قولنا الفكرة ببساطة..." required></textarea>

        <label>إنت شايف إزاي نقدر ننفذها؟</label>
        <textarea id="userExec" rows="3" placeholder="خطوات التنفيذ..." required></textarea>

        <button type="submit" id="btnSubmit">إبعت الفكرة</button>
    </form>

    <div id="msg" class="success-banner">شكراً لمشاركتك! ❤️</div>

    <div class="ideas-section">
        <h3 style="text-align: center;">أفكار الفريق</h3>
        <div id="displayArea" style="text-align: center; color: #888;">جاري تحميل الأفكار...</div>
    </div>
</div>

<script>
    // Your updated deployment URL
    const scriptURL = "https://script.google.com/macros/s/AKfycbx9XVWoWg5FKj9yrdWdNQ-bPopBRNQdq268UnKxXsGnLDinmOI93w5jhRyOiukH01lkNw/exec";

    // --- 1. Load Ideas Function ---
    function loadIdeas() {
        const display = document.getElementById('displayArea');
        
        fetch(scriptURL + "?nocache=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            if (!data || data.length === 0) {
                display.innerHTML = "لسه مفيش أفكار، شاركنا بأول فكرة!";
                return;
            }
            let html = "";
            // Reverse so newest ideas appear first
            data.slice().reverse().forEach(item => {
                html += `
                    <div class="idea-item">
                        <p><b>👤 الاسم:</b> ${item.الاسم || 'غير معروف'}</p>
                        <p><b>💡 الفكرة:</b> ${item.الفكرة || 'لا يوجد وصف'}</p>
                        <p><b>🛠️ التنفيذ:</b> ${item.التنفيذ || 'غير محدد'}</p>
                        <div class="btn-group">
                            <button class="btn-edit" onclick="editIdea(${item.id}, '${item.الاسم}', '${item.الفكرة}', '${item.التنفيذ}')">تعديل</button>
                            <button class="btn-delete" onclick="deleteIdea(${item.id})">حذف</button>
                        </div>
                    </div>`;
            });
            display.innerHTML = html;
        })
        .catch(err => {
            console.error(err);
            display.innerHTML = "في مشكلة في التحميل، جرب تعمل Refresh.";
        });
    }

    // --- 2. Submit New Idea ---
    document.getElementById('ideaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "جاري الإرسال...";
        btn.disabled = true;

        const formData = new URLSearchParams();
        formData.append('action', 'add');
        formData.append('الاسم', document.getElementById('userName').value);
        formData.append('الفكرة', document.getElementById('userIdea').value);
        formData.append('التنفيذ', document.getElementById('userExec').value);

        fetch(scriptURL, { method: 'POST', body: formData })
        .then(() => {
            document.getElementById('ideaForm').reset();
            btn.innerText = "إبعت الفكرة";
            btn.disabled = false;
            document.getElementById('msg').style.display = 'block';
            setTimeout(() => { document.getElementById('msg').style.display = 'none'; }, 3000);
            loadIdeas();
        })
        .catch(err => {
            alert("خطأ في الاتصال");
            btn.disabled = false;
        });
    });

    // --- 3. Delete Function ---
    function deleteIdea(id) {
        if(confirm("هل أنت متأكد من حذف هذه الفكرة؟")) {
            const formData = new URLSearchParams();
            formData.append('action', 'delete');
            formData.append('id', id);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(() => loadIdeas());
        }
    }

    // --- 4. Edit Function ---
    function editIdea(id, name, idea, exec) {
        const newIdea = prompt("تعديل نص الفكرة:", idea);
        if (newIdea !== null && newIdea !== "") {
            const formData = new URLSearchParams();
            formData.append('action', 'edit');
            formData.append('id', id);
            formData.append('الاسم', name);
            formData.append('الفكرة', newIdea);
            formData.append('التنفيذ', exec);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(() => loadIdeas());
        }
    }

    // Start loading on page load
    loadIdeas();

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>

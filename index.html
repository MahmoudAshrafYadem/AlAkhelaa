<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"الاخلاء": قول فكرتك واحنا معاك</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 15px; }
        .app-card { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .logo { display: block; margin: 0 auto 15px; width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #007bff; }
        h2 { text-align: center; color: #333; font-size: 1.4rem; margin-bottom: 25px; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #fff; }
        button { width: 100%; background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; padding: 15px; margin-top: 20px; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .success-banner { display: none; background: #d4edda; color: #155724; padding: 15px; border-radius: 12px; text-align: center; margin-top: 20px; }
        
        .ideas-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .idea-item { background: #ffffff; border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .idea-item b { color: #007bff; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-edit { background: #ffc107; color: #000; flex: 1; padding: 8px; border-radius: 8px; border: none; font-weight: bold; }
        .btn-delete { background: #dc3545; color: #fff; flex: 1; padding: 8px; border-radius: 8px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-card">
    <img src="logo.png" alt="لوجو الفريق" class="logo">
    <h2>"الاخلاء": قول فكرتك واحنا معاك</h2>

    <form id="ideaForm">
        <label>الاسم</label>
        <input type="text" id="userName" placeholder="اكتب اسمك هنا..." required>

        <label>الفكرة</label>
        <textarea id="userIdea" rows="3" placeholder="اشرح فكرتك ببساطة..." required></textarea>

        <label>إنت شايف إزاي نقدر ننفذها؟</label>
        <textarea id="userExec" rows="3" placeholder="خطوات التنفيذ من وجهة نظرك..." required></textarea>

        <button type="submit" id="btnSubmit">إبعت الفكرة</button>
    </form>

    <div id="msg" class="success-banner">شكراً لمشاركتك! تم حفظ الفكرة ❤️</div>

    <div class="ideas-section">
        <h3 style="text-align: center; color: #555;">أفكار الفريق المبعوتة</h3>
        <div id="displayArea" style="text-align: center; color: #888;">جاري تحميل الأفكار...</div>
    </div>
</div>

<script>
    // الرابط الجديد اللي انت بعته
    const scriptURL = "https://script.google.com/macros/s/AKfycbx9XVWoWg5FKj9yrdWdNQ-bPopBRNQdq268UnKxXsGnLDinmOI93w5jhRyOiukH01lkNw/exec";

    // 1. وظيفة إرسال فكرة جديدة
    document.getElementById('ideaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "جاري الإرسال...";
        btn.disabled = true;

        const formData = new URLSearchParams();
        formData.append('action', 'add');
        formData.append('الاسم', document.getElementById('userName').value);
        formData.append('الفكرة', document.getElementById('userIdea').value);
        formData.append('التنفيذ', document.getElementById('userExec').value);

        fetch(scriptURL, { method: 'POST', body: formData })
        .then(() => {
            document.getElementById('ideaForm').reset();
            btn.innerText = "إبعت الفكرة";
            btn.disabled = false;
            document.getElementById('msg').style.display = 'block';
            setTimeout(() => { document.getElementById('msg').style.display = 'none'; }, 4000);
            loadIdeas(); // تحديث القائمة
        })
        .catch(err => alert("حصل مشكلة، اتأكد من النت وجرب تاني."));
    });

    // 2. وظيفة تحميل وعرض الأفكار
    function loadIdeas() {
        const area = document.getElementById('displayArea');
        fetch(scriptURL)
        .then(res => res.json())
        .then(data => {
            if (data.length === 0) {
                area.innerHTML = "لسه مفيش أفكار، ابدأ وشاركنا!";
                return;
            }
            let html = "";
            data.reverse().forEach(item => {
                html += `
                    <div class="idea-item">
                        <p><b>صاحب الفكرة:</b> ${item.الاسم}</p>
                        <p><b>الفكرة:</b> ${item.الفكرة}</p>
                        <p><b>التنفيذ:</b> ${item.التنفيذ}</p>
                        <div class="btn-group">
                            <button class="btn-edit" onclick="editIdea(${item.id}, '${item.الاسم}', '${item.الفكرة}', '${item.التنفيذ}')">تعديل</button>
                            <button class="btn-delete" onclick="deleteIdea(${item.id})">حذف</button>
                        </div>
                    </div>`;
            });
            area.innerHTML = html;
        })
        .catch(err => area.innerHTML = "مش عارفين نحمل الأفكار دلوقتي.");
    }

    // 3. وظيفة الحذف
    function deleteIdea(id) {
        if(confirm("متأكد إنك عايز تحذف الفكرة دي نهائياً؟")) {
            const formData = new URLSearchParams();
            formData.append('action', 'delete');
            formData.append('id', id);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(() => loadIdeas());
        }
    }

    // 4. وظيفة التعديل
    function editIdea(id, name, idea, exec) {
        const newIdea = prompt("تعديل الفكرة:", idea);
        if (newIdea !== null && newIdea !== "") {
            const formData = new URLSearchParams();
            formData.append('action', 'edit');
            formData.append('id', id);
            formData.append('الاسم', name);
            formData.append('الفكرة', newIdea);
            formData.append('التنفيذ', exec);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(() => loadIdeas());
        }
    }

    // تشغيل التحميل أول ما نفتح الصفحة
    loadIdeas();
</script>

<script>
    // تفعيل الـ Service Worker عشان الـ PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
